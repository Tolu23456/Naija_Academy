name: Update Lesson Content

on:
  schedule:
    - cron: '0 3 * * 0'
  workflow_dispatch:
    inputs:
      subject:
        description: 'Subject to scrape (leave blank for all)'
        required: false
        default: ''
      crawl:
        description: 'Use full-site crawl mode? (true/false)'
        required: false
        default: 'false'

jobs:
  update-content:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install requests beautifulsoup4 lxml

      - name: Scrape lesson content
        run: |
          ARGS=""
          if [ -n "${{ github.event.inputs.subject }}" ]; then
            ARGS="$ARGS --subject ${{ github.event.inputs.subject }}"
          fi
          if [ "${{ github.event.inputs.crawl }}" = "true" ]; then
            ARGS="$ARGS --crawl"
          fi
          python3 scripts/scrape_content.py $ARGS
        continue-on-error: true

      - name: Merge notes from multiple sources
        run: python3 scripts/merge_notes.py
        continue-on-error: true

      - name: Build lessonsData JSON
        run: python3 scripts/build_lessons_data.py
        continue-on-error: true

      - name: Upload content to Supabase Storage
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_SERVICE_KEY" ]; then
            echo "⚠️  SUPABASE_URL / SUPABASE_SERVICE_KEY secrets not set — skipping upload"
            echo "Add these secrets in GitHub → Settings → Secrets → Actions"
          else
            python3 scripts/upload_content.py
          fi
        continue-on-error: true

      - name: Commit updated questions bank only
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add cbt_questions.json || true
          if ! git diff --cached --quiet; then
            git commit -m "chore: update questions bank [skip ci]"
            git push
          else
            echo "No question bank changes to commit"
          fi
        continue-on-error: true

      - name: Summary
        run: |
          echo "## Content Update Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f lib/lessonsData.ts ]; then
            LESSON_COUNT=$(grep -c '"title"' lib/lessonsData.ts || echo 0)
            echo "- Lesson topics compiled: ~${LESSON_COUNT}" >> $GITHUB_STEP_SUMMARY
          fi
          if [ -f cbt_questions.json ]; then
            Q_COUNT=$(grep -c '"question"' cbt_questions.json || echo 0)
            echo "- Questions in bank: ~${Q_COUNT}" >> $GITHUB_STEP_SUMMARY
          fi
          echo "- Lessons uploaded to Supabase Storage (no rebuild triggered)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> App fetches updated content on next launch via **EXPO_PUBLIC_LESSONS_URL**" >> $GITHUB_STEP_SUMMARY
