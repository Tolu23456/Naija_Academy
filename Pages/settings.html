<section class="view active">
    <div class="view-header">
        <h1 class="view-title">Settings</h1>
        <p class="view-subtitle">Manage your account and app preferences.</p>
    </div>
    <div class="glass-card mt-2 padding-2 form-group">
        <label>Display Theme</label>
        <select class="styled-input">
            <option>Dark Mode (Premium)</option>
            <option>Light Mode</option>
            <option>System Default</option>
        </select>
        
        <label class="mt-2">Notification Preferences</label>
        <div class="mt-1">
            <label class="custom-checkbox">
                <input type="checkbox" checked>
                <span><i class='bx bx-check'></i> Daily Study Reminders</span>
            </label>
            <label class="custom-checkbox">
                <input type="checkbox" checked>
                <span><i class='bx bx-check'></i> New Content Alerts</span>
            </label>
        </div>

        <button class="btn btn-primary mt-2">Save Changes</button>
        <!-- Padding for smooth scrolling demo -->
        <div style="height: 50vh;"></div> 
        <button class="btn btn-outline text-danger" style="border-color: var(--danger);">Log Out</button>
    </div>
</section>
